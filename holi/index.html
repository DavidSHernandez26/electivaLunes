<style>

/* =====================
PALETA
===================== */
:root{
 --purple:#0F0326;
 --green:#84A07C;
 --white:#F4F4F9;
}

/* =====================
BASE
===================== */
body{
font-family:
-apple-system,
BlinkMacSystemFont,
"SF Pro Display",
"SF Pro Text",
"Helvetica Neue",
Helvetica,
Arial,
sans-serif;

transition:.35s ease;
margin:0;
letter-spacing:-0.2px;
-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
}
h1,h2,h3,h4{
font-weight:600;
letter-spacing:-0.5px;
}

h1{ font-size:52px; }
h2{ font-size:38px; }

p{
font-size:18px;
line-height:1.7;
opacity:.85;
}

/* =====================
MODOS
===================== */
.dark-mode{
background:var(--purple);
color:white;
}

.light-mode{
background:var(--green);
color:var(--purple);
}

/* =====================
SECCIONES
===================== */
section{
padding:70px 0;
}

.brand-container{
max-width:1100px;
margin:auto;
padding:0 20px;
}

/* =====================
LOGOS
===================== */
.brand-logo{
width:220px;
transition:.3s;
}

.logo-small{
width:180px;
}

/* =====================
DIVIDER
===================== */
.divider{
width:60px;
height:3px;
background:currentColor;
opacity:.3;
margin:25px 0;
border-radius:20px;
}

/* =====================
BOTON
===================== */
.theme-btn{
position:fixed;
top:25px;
right:25px;
border:none;
padding:12px 20px;
border-radius:30px;
font-weight:600;
cursor:pointer;
z-index:999;
}

.dark-mode .theme-btn{
background:white;
color:black;
}

.light-mode .theme-btn{
background:#0F0326;
color:white;
}

/* =====================
PALETA TARJETAS
===================== */
.palette-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:40px;
margin-top:50px;
}

.color-card{
border-radius:20px;
overflow:hidden;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
transition:.3s;
}

.color-card:hover{
transform:translateY(-6px);
}

.color-preview{
height:200px;
display:flex;
align-items:center;
justify-content:center;
}

.color-preview img{
width:120px;
}

.color-info{
padding:25px;
}

/* =====================
MOCKUPS
===================== */

.mockup-wrapper{
margin-top:50px;
display:flex;
justify-content:center;
}

.mockup-img{
width:100%;
max-width:1100px;
border-radius:20px;
transition:.4s;
}

.mockup-img:hover{
transform:scale(1.01);
}

.dark-mode .mockup-img{
filter:drop-shadow(0 25px 60px rgba(0,0,0,.6));
}

.light-mode .mockup-img{
filter:drop-shadow(0 15px 40px rgba(0,0,0,.25));
}

</style>
</head>

<body class="dark-mode">

Modo Claro / Oscuro
</button>

<!-- PORTADA -->
<section class="text-center">

<img id="mainLogo"
src="img/Logo1.png"
class="brand-logo mb-4">

<h1>Be: Confident.</h1>

<p class="mt-4">
Be: Confident transforma la forma en que organizas,
exploras y defines tu estilo personal mediante
un closet virtual inteligente.
</p>

</div>
</section>

<!-- (EL RESTO DE TU HTML SIGUE EXACTAMENTE IGUAL...) -->

<script>

function toggleTheme(){

const body=document.body;

const darkLogos=["mainLogo","logoConcepto","logoGreen"];
const lightLogos=["logoPurple"];

if(body.classList.contains("dark-mode")){

body.classList.replace("dark-mode","light-mode");

darkLogos.forEach(id=>{
let el=document.getElementById(id);
if(el) el.src="img/Logo2.png";
});

lightLogos.forEach(id=>{
let el=document.getElementById(id);
if(el) el.src="img/Logo1.png";
});

localStorage.setItem("theme","light");

}else{

body.classList.replace("light-mode","dark-mode");

darkLogos.forEach(id=>{
let el=document.getElementById(id);
if(el) el.src="img/Logo1.png";
});

lightLogos.forEach(id=>{
let el=document.getElementById(id);
if(el) el.src="img/Logo2.png";
});

localStorage.setItem("theme","dark");
}
}

window.onload=()=>{

const saved=localStorage.getItem("theme");

if(saved==="light"){
toggleTheme();
}

}

</script>

</body>
